<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACCAR Dealer Network — Peterbilt & Kenworth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --pb-red: #CC1F26;
    --pb-dark: #1a0608;
    --kw-blue: #003087;
    --kw-yellow: #F5A800;
    --bg: #0d0e11;
    --surface: #14161c;
    --surface2: #1e2029;
    --border: #2a2d38;
    --text: #e8eaf0;
    --muted: #7a7f94;
    --accent: #ff6b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0;
    height: 56px;
    flex-shrink: 0;
    z-index: 100;
    position: relative;
  }

  .header-brand {
    display: flex;
    align-items: center;
    height: 100%;
  }

  .brand-pb {
    background: var(--pb-red);
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%);
    padding-right: 28px;
  }

  .brand-kw {
    background: var(--kw-blue);
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 20px 0 28px;
    gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 12px 100%, 0 50%);
  }

  .brand-kw span.kw-dot { color: var(--kw-yellow); }

  .header-title {
    flex: 1;
    padding: 0 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-stats {
    display: flex;
    gap: 1px;
    height: 100%;
    margin-right: 0;
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 18px;
    background: var(--surface2);
    border-left: 1px solid var(--border);
    font-size: 12px;
  }

  .stat-chip .num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    font-weight: 400;
  }

  .stat-chip .lbl {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-chip.pb .num { color: var(--pb-red); }
  .stat-chip.kw .num { color: var(--kw-yellow); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-controls {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .filter-btn.active-pb {
    background: var(--pb-red);
    border-color: var(--pb-red);
    color: white;
  }

  .filter-btn.active-kw {
    background: var(--kw-blue);
    border-color: var(--kw-yellow);
    color: var(--kw-yellow);
  }

  .filter-btn.active-all {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  .search-box svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  /* DEALER LIST */
  .dealer-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .dealer-list::-webkit-scrollbar { width: 4px; }
  .dealer-list::-webkit-scrollbar-track { background: transparent; }
  .dealer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .dealer-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .dealer-item:hover { background: var(--surface2); }
  .dealer-item.selected { background: rgba(255, 107, 53, 0.08); border-left: 3px solid var(--accent); }

  .dealer-badge {
    width: 28px;
    height: 28px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 10px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .dealer-badge.pb { background: var(--pb-red); color: white; }
  .dealer-badge.kw { background: var(--kw-blue); color: var(--kw-yellow); }

  .dealer-info h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    line-height: 1.2;
  }

  .dealer-info .location {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .dealer-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 1px;
    letter-spacing: 0.5px;
  }

  .tag.bays { background: rgba(245, 168, 0, 0.15); color: var(--kw-yellow); }
  .tag.emp { background: rgba(0, 48, 135, 0.3); color: #6ea6ff; }
  .tag.mx { background: rgba(204, 31, 38, 0.2); color: #ff8888; }
  .tag.award { background: rgba(255, 255, 255, 0.05); color: var(--muted); }

  /* BRAND HISTORY PANEL */
  .history-toggle {
    padding: 10px 14px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .hist-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .hist-btn.active-pb { background: rgba(204,31,38,0.15); border-color: var(--pb-red); color: #ff8888; }
  .hist-btn.active-kw { background: rgba(0,48,135,0.2); border-color: var(--kw-blue); color: #6ea6ff; }

  /* MAP AREA */
  .map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0c12;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* Leaflet overrides */
  .leaflet-tile-pane { filter: grayscale(100%) brightness(0.35) sepia(0.3) hue-rotate(180deg); }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
  .leaflet-control-attribution { background: rgba(13,14,17,0.8) !important; color: var(--muted) !important; font-size: 9px !important; }

  /* DETAIL PANEL */
  .detail-panel {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    z-index: 1000;
    transform: translateX(360px);
    transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .detail-panel.open { transform: translateX(0); }

  .detail-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .detail-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 2px;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .close-btn:hover { color: var(--text); }

  .detail-brand-bar {
    height: 3px;
    width: 100%;
  }

  .detail-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section h4 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--surface2);
    padding: 10px 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
  }

  .stat-card .val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-card .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-card.pb .val { color: #ff8888; }
  .stat-card.kw .val { color: var(--kw-yellow); }

  .detail-text {
    font-size: 13px;
    line-height: 1.7;
    color: #b0b4c4;
  }

  .ai-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .services-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .service-pill {
    padding: 4px 9px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
  }

  .ext-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    width: 100%;
    justify-content: center;
  }

  .ext-link.pb:hover { background: rgba(204,31,38,0.15); border-color: var(--pb-red); }
  .ext-link.kw:hover { background: rgba(0,48,135,0.2); border-color: var(--kw-yellow); color: var(--kw-yellow); }

  /* HISTORY MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: min(680px, 95vw);
    max-height: 85vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .modal-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .modal-header h2.pb { color: var(--pb-red); }
  .modal-header h2.kw { color: var(--kw-yellow); }

  .modal-body {
    padding: 24px;
  }

  .timeline {
    position: relative;
    padding-left: 28px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: var(--border);
  }

  .timeline-item {
    position: relative;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease backwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: -22px;
    top: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }

  .timeline-item .year {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 3px;
  }

  .timeline-item .event {
    font-size: 13px;
    line-height: 1.6;
    color: #b0b4c4;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-stat {
    background: var(--surface2);
    padding: 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    text-align: center;
  }

  .modal-stat .big {
    font-family: 'Share Tech Mono', monospace;
    font-size: 26px;
    margin-bottom: 4px;
  }

  .modal-stat .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* CUSTOM MARKERS */
  .marker-pb, .marker-kw {
    display: flex !important;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 9px;
    letter-spacing: 0.5px;
    border: 2px solid;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .marker-pb { background: var(--pb-red); border-color: rgba(255,255,255,0.3); color: white; }
  .marker-kw { background: var(--kw-blue); border-color: var(--kw-yellow); color: var(--kw-yellow); }
  .marker-pb:hover, .marker-kw:hover { transform: scale(1.3); }

  .leaflet-div-icon { background: none; border: none; }

  /* LEGEND */
  .map-legend {
    position: absolute;
    bottom: 24px;
    left: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 2px;
    z-index: 900;
    display: flex;
    gap: 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 1px;
    border: 1.5px solid;
  }

  .legend-dot.pb { background: var(--pb-red); border-color: rgba(255,255,255,0.3); }
  .legend-dot.kw { background: var(--kw-blue); border-color: var(--kw-yellow); }

  .count-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 2px;
  }

  .count-badge.pb { background: rgba(204,31,38,0.2); color: #ff8888; }
  .count-badge.kw { background: rgba(0,48,135,0.3); color: #6ea6ff; }

  /* ── MOBILE NAV BAR ─────────────────────────────────────────── */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 1500;
    flex-direction: row;
  }

  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.2s;
    border-top: 2px solid transparent;
    padding-bottom: 4px;
  }

  .mobile-nav-btn svg { width: 20px; height: 20px; }
  .mobile-nav-btn.active-map { color: var(--accent); border-top-color: var(--accent); }
  .mobile-nav-btn.active-list { color: #6ea6ff; border-top-color: #6ea6ff; }
  .mobile-nav-btn.active-hist { color: var(--kw-yellow); border-top-color: var(--kw-yellow); }

  /* ── MOBILE DRAWER (list panel) ─────────────────────────────── */
  .mobile-drawer {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 0;
    right: 0;
    height: 55vh;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 1400;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
  }

  .mobile-drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }

  /* ── MOBILE HISTORY SHEET ────────────────────────────────────── */
  .mobile-hist-sheet {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 0;
    right: 0;
    height: 65vh;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 1400;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
    overflow: hidden;
  }

  .mobile-hist-sheet.open { transform: translateY(0); }

  .hist-sheet-tabs {
    display: flex;
    gap: 0;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .hist-sheet-tab {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .hist-sheet-tab.active-pb { color: #ff8888; border-bottom-color: var(--pb-red); }
  .hist-sheet-tab.active-kw { color: var(--kw-yellow); border-bottom-color: var(--kw-yellow); }

  .hist-sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── RESPONSIVE BREAKPOINTS ─────────────────────────────────── */
  @media (max-width: 768px) {

    /* Header: hide stats and title, keep brand marks */
    .header-title { display: none; }
    .header-stats { display: none; }
    header { height: 48px; }

    /* Hide desktop sidebar */
    .sidebar { display: none; }

    /* Map takes full screen */
    .map-container { width: 100%; }
    .main { flex-direction: column; }

    /* Detail panel: full-width bottom sheet on mobile */
    .detail-panel {
      top: auto;
      bottom: 60px;
      right: 0;
      left: 0;
      width: 100%;
      max-height: 60vh;
      border-radius: 12px 12px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
    }

    .detail-panel.open { transform: translateY(0); }

    /* Legend: move above nav bar */

      bottom: 70px;

      padding: 7px 10px;
      gap: 10px;
    }

    /* Show mobile UI */

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let selectedId = null;
let markers = {};
let map;

// ── INIT MAP ──────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: [42, -96],
    zoom: 4,
    zoomControl: true,
    attributionControl: true,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18,
  }).addTo(map);

  dealers.forEach(d => {
    const size = Math.min(28 + Math.floor(d.locations / 5) * 2, 44);
    const cls = d.brand === 'pb' ? 'marker-pb' : 'marker-kw';
    const lbl = d.brand === 'pb' ? 'PB' : 'KW';

    const icon = L.divIcon({
      className: 'leaflet-div-icon',
      html: `<div class="${cls}" style="width:${size}px;height:${size}px;border-radius:3px;font-size:${size > 34 ? 11 : 9}px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:0.5px;border:2px solid ${d.brand === 'pb' ? 'rgba(255,255,255,0.3)' : '#F5A800'};background:${d.brand === 'pb' ? '#CC1F26' : '#003087'};color:${d.brand === 'pb' ? 'white' : '#F5A800'};box-shadow:0 2px 8px rgba(0,0,0,0.6);cursor:pointer">${lbl}</div>`,
      iconSize: [size, size],
      iconAnchor: [size/2, size/2],
    });

    const marker = L.marker([d.lat, d.lng], { icon })
      .addTo(map)
      .on('click', () => openDetail(d.id));

    markers[d.id] = marker;
  });
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn-all').className = 'filter-btn' + (f === 'all' ? ' active-all' : '');
  document.getElementById('btn-pb').className = 'filter-btn' + (f === 'pb' ? ' active-pb' : '');
  document.getElementById('btn-kw').className = 'filter-btn' + (f === 'kw' ? ' active-kw' : '');

  dealers.forEach(d => {
    const show = f === 'all' || d.brand === f;
    if (show) markers[d.id].addTo(map);
    else map.removeLayer(markers[d.id]);
  });

  renderList();
}

function filterList() {
  renderList();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return dealers.filter(d => {
    const brandMatch = currentFilter === 'all' || d.brand === currentFilter;
    const searchMatch = !q || d.name.toLowerCase().includes(q) || d.state.toLowerCase().includes(q) || d.group.toLowerCase().includes(q);
    return brandMatch && searchMatch;
  });
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('dealer-list');
  const filtered = getFiltered();
  list.innerHTML = '';

  filtered.forEach(d => {
    const div = document.createElement('div');
    div.className = 'dealer-item' + (selectedId === d.id ? ' selected' : '');
    div.onclick = () => openDetail(d.id);

    const badgeClass = d.brand === 'pb' ? 'pb' : 'kw';
    const badgeText = d.brand === 'pb' ? 'PB' : 'KW';

    div.innerHTML = `
      <div class="dealer-badge ${badgeClass}">${badgeText}</div>
      <div class="dealer-info">
        <h3>${d.name}</h3>
        <div class="location">📍 ${d.state}</div>
        <div class="dealer-tags">
          <span class="tag bays">⚙ ${d.bays} bays</span>
          <span class="tag emp">👥 ${d.employees.toLocaleString()} emp</span>
          <span class="tag mx">🔧 ${d.mxTechs} MX techs</span>
          ${d.award ? `<span class="tag award">🏆 ${d.award.substring(0, 18)}…</span>` : ''}
        </div>
      </div>`;

    list.appendChild(div);
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No dealers match your search</div>';
  }
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function openDetail(id) {
  const d = dealers.find(x => x.id === id);
  if (!d) return;

  selectedId = id;
  renderList();

  // Fly map to dealer
  map.flyTo([d.lat, d.lng], 6, { animate: true, duration: 0.8 });

  // Set header
  document.getElementById('detail-name').textContent = d.name;
  document.getElementById('detail-location').textContent = `${d.state} · ${d.locations} locations`;
  document.getElementById('detail-bar').style.background = d.brand === 'pb'
    ? 'var(--pb-red)'
    : 'linear-gradient(90deg, var(--kw-blue), var(--kw-yellow))';

  const cls = d.brand === 'pb' ? 'pb' : 'kw';
  const servicesHtml = d.services.map(s => `<span class="service-pill">${s}</span>`).join('');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <h4>Key Figures</h4>
      <div class="stats-grid">
        <div class="stat-card ${cls}">
          <div class="val">${d.locations}</div>
          <div class="lbl">Locations</div>
        </div>
        <div class="stat-card ${cls}">
          <div class="val">${d.employees.toLocaleString()}</div>
          <div class="lbl">Employees</div>
        </div>
        <div class="stat-card ${cls}">
          <div class="val">${d.bays}</div>
          <div class="lbl">Service Bays</div>
        </div>
        <div class="stat-card ${cls}">
          <div class="val">${d.mxTechs}</div>
          <div class="lbl">MX Techs</div>
        </div>
      </div>
    </div>
    <div class="detail-section">
      <h4>About</h4>
      <p class="detail-text">${d.description}</p>
      ${d.award ? `<div style="margin-top:10px;padding:8px 10px;background:rgba(255,107,53,0.08);border-left:3px solid var(--accent);font-size:12px;color:var(--accent)">🏆 ${d.award}</div>` : ''}
    </div>
    <div class="detail-section">
      <h4>Services Offered</h4>
      <div class="services-list">${servicesHtml}</div>
    </div>
    <div class="detail-section" style="border-bottom:none">
      <h4>Founded ${d.founded} · ${d.phone}</h4>
      <a class="ext-link ${cls}" href="${d.website}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Visit Official Website
      </a>
    </div>`;

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderList();
}

function openHistory(brand) {
  const data = historyData[brand];
  const cls = brand;
  const modal = document.getElementById('modal-content');

  const statsHtml = data.stats.map(s => `
    <div class="modal-stat">
      <div class="big" style="color:${data.color}">${s.big}</div>
      <div class="lbl">${s.lbl}</div>
    </div>`).join('');

  const timelineHtml = data.timeline.map((t, i) => `
    <div class="timeline-item" style="animation-delay:${i * 0.04}s">
      <div class="year">${t.year}</div>
      <div class="event">${t.event}</div>
    </div>`).join('');

  modal.innerHTML = `
    <div class="modal-header">
      <div>
        <h2 class="${cls}">${data.title}</h2>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${data.subtitle}</div>
      </div>
      <button class="close-btn" onclick="closeModal()" style="font-size:22px">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-stats">${statsHtml}</div>
      <h4 style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">Company Timeline</h4>
      <div class="timeline">${timelineHtml}</div>
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById(`hist-${brand}`).classList.add(`active-${brand}`);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.querySelectorAll('.hist-btn').forEach(b => b.className = 'hist-btn');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  renderList();
  initMobile();
});

// ── MOBILE ────────────────────────────────────────────────────────────────────
let mobileTab = 'map';

function initMobile() {
  const nav = document.createElement('nav');
  nav.className = 'mobile-nav';
  nav.id = 'mobile-nav';
  nav.innerHTML = `
    <button class="mobile-nav-btn active-map" id="mnav-map" onclick="mobileSetTab('map')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/>
        <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
      </svg>Map</button>
    <button class="mobile-nav-btn" id="mnav-list" onclick="mobileSetTab('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>Dealers</button>
    <button class="mobile-nav-btn" id="mnav-hist" onclick="mobileSetTab('hist')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
      </svg>History</button>`;
  document.body.appendChild(nav);

  const drawer = document.createElement('div');
  drawer.className = 'mobile-drawer';
  drawer.id = 'mobile-drawer';
  drawer.innerHTML = `
    <div class="drawer-handle"></div>
    <div class="sidebar-controls" style="padding:10px 12px;border-bottom:1px solid var(--border)">
      <div class="filter-row">
        <button class="filter-btn active-all" id="mbtn-all" onclick="setFilter('all');mobileRenderList()">All</button>
        <button class="filter-btn" id="mbtn-pb" onclick="setFilter('pb');mobileRenderList()">Peterbilt</button>
        <button class="filter-btn" id="mbtn-kw" onclick="setFilter('kw');mobileRenderList()">Kenworth</button>
      </div>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>

        <input type="text" placeholder="Search dealer or state…" id="msearch-input" oninput="mobileRenderList()">
      </div>
    </div>
    <div class="dealer-list" id="mobile-dealer-list" style="flex:1;overflow-y:auto"></div>`;
  document.body.appendChild(drawer);

  const hist = document.createElement('div');
  hist.className = 'mobile-hist-sheet';
  hist.id = 'mobile-hist-sheet';
  hist.innerHTML = `
    <div class="drawer-handle"></div>
    <div class="hist-sheet-tabs">
      <button class="hist-sheet-tab active-pb" id="htab-pb" onclick="mobileShowHist('pb')">&#9654; Peterbilt</button>

  mobileShowHist('pb');

function mobileSetTab(tab) {
  mobileTab = tab;
  ['map','list','hist'].forEach(t => {
    const btn = document.getElementById('mnav-' + t);
    if (btn) btn.className = 'mobile-nav-btn' + (t === tab ? ' active-' + t : '');
  });
  const drawer = document.getElementById('mobile-drawer');
  const hist = document.getElementById('mobile-hist-sheet');
  if (tab === 'list') {
    if (drawer) drawer.classList.add('open');
    if (hist) hist.classList.remove('open');
    mobileRenderList();
  } else if (tab === 'hist') {
    if (hist) hist.classList.add('open');
    if (drawer) drawer.classList.remove('open');
  } else {
    if (drawer) drawer.classList.remove('open');
    if (hist) hist.classList.remove('open');
  }
}

function mobileRenderList() {
  const q = (document.getElementById('msearch-input') ? document.getElementById('msearch-input').value : '').toLowerCase();
  const list = document.getElementById('mobile-dealer-list');
  if (!list) return;
  const filtered = dealers.filter(d => {
    const brandMatch = currentFilter === 'all' || d.brand === currentFilter;
    const searchMatch = !q || d.name.toLowerCase().includes(q) || d.state.toLowerCase().includes(q);
    return brandMatch && searchMatch;
  });
  list.innerHTML = '';
  filtered.forEach(d => {
    const div = document.createElement('div');
    div.className = 'dealer-item' + (selectedId === d.id ? ' selected' : '');
    div.onclick = () => { openDetail(d.id); mobileSetTab('map'); };
    const bc = d.brand === 'pb' ? 'pb' : 'kw';
    const bt = d.brand === 'pb' ? 'PB' : 'KW';
    div.innerHTML = `
      <div class="dealer-badge ${bc}">${bt}</div>
      <div class="dealer-info">
        <h3>${d.name}</h3>
        <div class="location">&#128205; ${d.state}</div>
        <div class="dealer-tags">
          <span class="tag bays">&#9881; ${d.bays} bays</span>
          <span class="tag emp">&#128101; ${d.employees.toLocaleString()}</span>
          <span class="tag mx">&#128295; ${d.mxTechs} MX</span>
        </div>
      </div>`;
    list.appendChild(div);
  });
  if (!filtered.length) list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No dealers match</div>';
}

function mobileShowHist(brand) {
  const data = historyData[brand];
  ['pb','kw'].forEach(b => {
    const tab = document.getElementById('htab-' + b);
    if (tab) tab.className = 'hist-sheet-tab' + (b === brand ? ' active-' + b : '');
  });
  const statsHtml = data.stats.map(s =>
    '<div class="modal-stat" style="padding:10px 8px"><div style="font-family:\'Share Tech Mono\',monospace;font-size:20px;color:' + data.color + ';margin-bottom:3px">' + s.big + '</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px">' + s.lbl + '</div></div>'
  ).join('');
  const timelineHtml = data.timeline.map((t, i) =>
    '<div class="timeline-item" style="animation-delay:' + (i * 0.03) + 's"><div class="year">' + t.year + '</div><div class="event">' + t.event + '</div></div>'
  ).join('');
  const body = document.getElementById('hist-sheet-body');
  if (body) body.innerHTML =
    '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;margin-bottom:12px;color:' + data.color + '">' + data.title + '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">' + statsHtml + '</div>' +
    '<div class="timeline">' + timelineHtml + '</div>';
}
</script>
